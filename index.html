<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>on:pace</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #ffffff;
}

.container {
    position: relative;
    width: 100vw;
    height: 100vh;
}

video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.logo {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);

    /* Responsive sizing */
    width: clamp(150px, 25vw, 500px);
    height: auto;

    pointer-events: none;
    user-select: none;
}
</style>
</head>

<body>

<div class="container">
    <video autoplay muted loop playsinline>
        <source src="video.mp4" type="video/mp4">
    </video>

    <img class="logo" src="logo.svg" alt="Logo">
</div>

</body>
</html>
